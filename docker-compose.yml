# =============================================================================
# docker-compose.yml — Kraivor Full Stack (Production-like)
# =============================================================================
# Use for: staging, production simulation, full integration testing
#
# Usage:
#   docker-compose up --build -d
#   docker-compose logs -f identity
#   docker-compose down
#   docker-compose down -v   ← also deletes volumes (destructive)
#
# All services use multi-stage production Dockerfiles.
# Secrets come from .env (never committed) or Docker secrets in real prod.
# =============================================================================

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: kraivor-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-kraivor}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kraivor}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    # Postgres tuning — adjust to your host RAM
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c log_min_duration_statement=1000

  redis:
    image: redis:7-alpine
    container_name: kraivor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    # Persist to disk so cache survives restarts
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  mailhog:
    image: mailhog/mailhog:latest
    container_name: kraivor-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    logging:
      driver: "none"
    profiles:
      # Only starts when you explicitly request it:
      # docker-compose --profile dev up
      # In real prod, remove mailhog entirely and use SES
      - dev

  kafka:
    image: bitnami/kafka:3.6
    container_name: kraivor-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_LOG_RETENTION_HOURS: 168
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Application Services ────────────────────────────────────────────────────

  identity:
    build:
      context: ./services/auth
      dockerfile: Dockerfile        # production multi-stage
    container_name: kraivor-identity
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: auth.settings.production
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/api/health/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    # No source volume mount in prod — code is baked into the image
    # No venv volume — venv is in /app/.venv inside the image

  core:
    build:
      context: ./services/core
      dockerfile: Dockerfile
    container_name: kraivor-core
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.production
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8002:8002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/api/health/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  analysis:
    build:
      context: ./services/analysis
      dockerfile: Dockerfile
    container_name: kraivor-analysis
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8003:8003"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/api/health/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  ai:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    container_name: kraivor-ai
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8004:8004"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8004/api/health/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  notifications:
    build:
      context: ./services/notifications
      dockerfile: Dockerfile
    container_name: kraivor-notifications
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8005:8005"
    restart: unless-stopped

  realtime:
    build:
      context: ./services/realtime
      dockerfile: Dockerfile
    container_name: kraivor-realtime
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8006:8006"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kraivor-frontend
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - identity
      - core
    restart: unless-stopped

  # ── Reverse Proxy ───────────────────────────────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    container_name: kraivor-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/docker/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      # Mount SSL certs if you have them (self-signed for local, real certs for prod)
      # - ./infra/docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      identity:
        condition: service_healthy
      core:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    name: kraivor_postgres_data
  redis_data:
    name: kraivor_redis_data
  kafka_data:
    name: kraivor_kafka_data