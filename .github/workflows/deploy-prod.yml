name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          services="identity core analysis ai notifications realtime"
          for svc in $services; do
            docker build -t $ECR_REGISTRY/kraivor-$svc:${{ github.sha }} ./services/$svc
            docker tag $ECR_REGISTRY/kraivor-$svc:${{ github.sha }} $ECR_REGISTRY/kraivor-$svc:latest
            docker push $ECR_REGISTRY/kraivor-$svc:${{ github.sha }}
            docker push $ECR_REGISTRY/kraivor-$svc:latest
          done

      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name kraivor-prod
          kubectl apply -f infra/kubernetes/namespace.yaml
          kubectl apply -f infra/kubernetes/services/
          kubectl apply -f infra/kubernetes/infrastructure/
          kubectl set image deployment -l app=kraivor ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }} --all
