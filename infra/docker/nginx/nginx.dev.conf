events {
    worker_connections 1024;
}

http {
    # Upstream definitions for all services
    upstream auth {
        server auth:8001;
    }
    
    upstream core {
        server core:8002;
    }
    
    upstream analysis {
        server analysis:8003;
    }
    
    upstream ai {
        server ai:8004;
    }
    
    upstream notifications {
        server notifications:8005;
    }
    
    upstream realtime {
        server realtime:8006;
    }
    
    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # Auth Service (auth) - Port 8001
        location /api/auth/ {
            proxy_pass http://auth/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Core API Service - Port 8002
        location /api/workspace/ {
            proxy_pass http://core/api/workspace/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Analysis Service - Port 8003
        location /api/analysis/ {
            proxy_pass http://analysis/api/analysis/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # AI Service - Port 8004
        location /api/ai/ {
            proxy_pass http://ai/api/ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Notifications Service - Port 8005
        location /api/notifications/ {
            proxy_pass http://notifications/api/notifications/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # WebSocket (Realtime Service) - Port 8006
        location /ws/ {
            proxy_pass http://realtime/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://auth/health/;
            proxy_set_header Host $host;
        }

        # Frontend (Next.js) - Port 3000
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}