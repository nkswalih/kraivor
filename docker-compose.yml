# =============================================================================
# Kraivor Docker Compose - Full Stack
# =============================================================================
# This is the production-compose with all services
# For local development, use docker-compose.dev.yml
# =============================================================================

services:
  # Infrastructure
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kraivor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kraivor}
      POSTGRES_DB: ${POSTGRES_DB:-kraivor}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kraivor}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Development email catch
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    logging:
      driver: "none"

  # Message queue
  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: true

  # Auth/Identity Service
  identity:
    build:
      context: ./services/auth
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=auth.settings.development
      - DB_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes:
      - ./services/auth:/app
      - identity_venv:/app/.venv

  # Core Service
  core:
    build:
      context: ./services/core
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
    depends_on:
      - postgres
      - redis
    ports:
      - "8002:8002"
    volumes:
      - ./services/core:/app

  # Analysis Service
  analysis:
    build: ./services/analysis
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
    depends_on:
      - postgres
      - redis
      - kafka
    ports:
      - "8003:8003"
    volumes:
      - ./services/analysis:/app

  # AI Service
  ai:
    build: ./services/ai
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
    depends_on:
      - postgres
      - redis
      - kafka
    ports:
      - "8004:8004"
    volumes:
      - ./services/ai:/app

  # Notifications Service
  notifications:
    build: ./services/notifications
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
    depends_on:
      - postgres
      - redis
      - kafka
    ports:
      - "8005:8005"
    volumes:
      - ./services/notifications:/app

  # Realtime Service (Node.js)
  realtime:
    build: ./services/realtime
    env_file:
      - .env
    depends_on:
      - redis
      - kafka
    ports:
      - "8006:8006"
    volumes:
      - ./services/realtime:/app

  # Frontend
  frontend:
    build: ./frontend
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/docker/nginx/nginx.dev.conf:/etc/nginx/nginx.conf
    depends_on:
      - identity
      - core
      - analysis
      - ai
      - notifications
      - realtime
      - frontend

volumes:
  postgres_data:
  identity_venv: