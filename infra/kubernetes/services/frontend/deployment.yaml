apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-service
  namespace: kraivor-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-service
  template:
    metadata:
      labels:
        app: frontend-service
    spec:
      containers:
      - name: frontend
        image: ${ECR_REGISTRY}/kraivor-frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "https://api.kraivor.com"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: kraivor-prod
spec:
  selector:
    app: frontend-service
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
