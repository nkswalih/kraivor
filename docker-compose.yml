version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: kraivor
      POSTGRES_PASSWORD: kraivor
      POSTGRES_DB: kraivor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  kafka:
    image: bitnami/kafka:3.5
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: true

  identity:
    build:
      context: ./services/identity
      dockerfile: Dockerfile.dev
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://kraivor:kraivor@postgres:5432/kraivor
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - ./services/identity:/app

  core:
    build:
      context: ./services/core
      dockerfile: Dockerfile.dev
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://kraivor:kraivor@postgres:5432/kraivor
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - ./services/core:/app

  analysis:
    build: ./services/analysis
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql://kraivor:kraivor@postgres:5432/kraivor
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    volumes:
      - ./services/analysis:/app

  ai:
    build: ./services/ai
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql://kraivor:kraivor@postgres:5432/kraivor
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    volumes:
      - ./services/ai:/app

  notifications:
    build: ./services/notifications
    ports:
      - "8005:8005"
    environment:
      DATABASE_URL: postgresql://kraivor:kraivor@postgres:5432/kraivor
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    volumes:
      - ./services/notifications:/app

  realtime:
    build: ./services/realtime
    ports:
      - "8006:8006"
    environment:
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - redis
      - kafka
    volumes:
      - ./services/realtime:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/docker/nginx/nginx.dev.conf:/etc/nginx/nginx.conf
    depends_on:
      - identity
      - core
      - analysis
      - ai
      - notifications
      - realtime
      - frontend

volumes:
  postgres_data:
