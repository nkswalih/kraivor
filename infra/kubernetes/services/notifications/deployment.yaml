apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications-service
  namespace: kraivor-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notifications-service
  template:
    metadata:
      labels:
        app: notifications-service
    spec:
      containers:
      - name: notifications
        image: ${ECR_REGISTRY}/kraivor-notifications:latest
        ports:
        - containerPort: 8005
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: kraivor-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: kraivor-secrets
              key: redis-url
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: notifications-service
  namespace: kraivor-prod
spec:
  selector:
    app: notifications-service
  ports:
  - port: 8005
    targetPort: 8005
  type: ClusterIP
