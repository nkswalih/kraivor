apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: kraivor-prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
      - name: identity
        image: ${ECR_REGISTRY}/kraivor-identity:latest
        ports:
        - containerPort: 8001
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: kraivor-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: kraivor-secrets
              key: redis-url
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: kraivor-prod
spec:
  selector:
    app: identity-service
  ports:
  - port: 8001
    targetPort: 8001
  type: ClusterIP
