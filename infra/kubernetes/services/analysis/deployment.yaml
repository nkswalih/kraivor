apiVersion: apps/v1
kind: Deployment
metadata:
  name: analysis-service
  namespace: kraivor-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analysis-service
  template:
    metadata:
      labels:
        app: analysis-service
    spec:
      containers:
      - name: analysis
        image: ${ECR_REGISTRY}/kraivor-analysis:latest
        ports:
        - containerPort: 8003
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: kraivor-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: kraivor-secrets
              key: redis-url
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: analysis-service
  namespace: kraivor-prod
spec:
  selector:
    app: analysis-service
  ports:
  - port: 8003
    targetPort: 8003
  type: ClusterIP
