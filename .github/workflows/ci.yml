name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test-identity:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: kraivor
          POSTGRES_PASSWORD: kraivor
          POSTGRES_DB: kraivor_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run migrations
        run: uv run python manage.py migrate
        env:
          DATABASE_URL: postgresql://kraivor:kraivor@localhost:5432/kraivor_dev
          REDIS_URL: redis://localhost:6379/0
      - name: Run tests
        run: uv run python manage.py test
        env:
          DATABASE_URL: postgresql://kraivor:kraivor@localhost:5432/kraivor_dev
          REDIS_URL: redis://localhost:6379/0

