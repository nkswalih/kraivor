services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kraivor}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-kraivor}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kraivor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    logging:
      driver: "none"

  kafka:
    image: bitnami/kafka:3.5
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: true

  identity:
    build:
      context: ./services/auth
      dockerfile: Dockerfile.dev
    ports:
      - "8001:8001"
    environment:
      DJANGO_SETTINGS_MODULE: auth.settings.development
      DB_HOST: postgres
      DATABASE_URL: postgresql://kraivor:${DB_PASSWORD}@postgres:5432/kraivor
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/auth:/app
      - identity_venv:/app/.venv

  core:
    build:
      context: ./services/core
      dockerfile: Dockerfile.dev
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://kraivor:${DB_PASSWORD}@postgres:5432/kraivor
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - ./services/core:/app

  analysis:
    build: ./services/analysis
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql://kraivor:${DB_PASSWORD}@postgres:5432/kraivor
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    volumes:
      - ./services/analysis:/app

  ai:
    build: ./services/ai
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql://kraivor:${DB_PASSWORD}@postgres:5432/kraivor
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    volumes:
      - ./services/ai:/app

  notifications:
    build: ./services/notifications
    ports:
      - "8005:8005"
    environment:
      DATABASE_URL: postgresql://kraivor:${DB_PASSWORD}@postgres:5432/kraivor
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    volumes:
      - ./services/notifications:/app

  realtime:
    build: ./services/realtime
    ports:
      - "8006:8006"
    environment:
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - redis
      - kafka
    volumes:
      - ./services/realtime:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/docker/nginx/nginx.dev.conf:/etc/nginx/nginx.conf
    depends_on:
      - identity
      - core
      - analysis
      - ai
      - notifications
      - realtime
      - frontend

volumes:
  postgres_data:
  identity_venv: