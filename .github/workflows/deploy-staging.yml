name: Deploy to Staging

on:
  push:
    branches: [ dev ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          services="identity core analysis ai notifications realtime"
          for svc in $services; do
            docker build -t $ECR_REGISTRY/kraivor-$svc:staging ./services/$svc
            docker push $ECR_REGISTRY/kraivor-$svc:staging
          done

      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name kraivor-staging
          kubectl apply -f infra/kubernetes/namespace.yaml
          kubectl apply -f infra/kubernetes/services/
          kubectl apply -f infra/kubernetes/infrastructure/
